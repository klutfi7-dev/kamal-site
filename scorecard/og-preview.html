<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 1200px;
        height: 630px;
        background: #0a1628;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Karla', sans-serif;
        overflow: hidden;
      }
      .card {
        width: 1200px;
        height: 630px;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .top {
        background: #f5f2ed;
        border-bottom: 2px solid rgba(184,115,51,0.25);
        padding: 0 96px;
        height: 80px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .body {
        flex: 1;
        padding: 56px 96px 52px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      /* subtle radial glow */
      .body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 60% at 30% 50%, rgba(184,115,51,0.09) 0%, transparent 70%);
        pointer-events: none;
      }
      /* thin copper left border */
      .body::after {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 4px;
        background: linear-gradient(to bottom, rgba(184,115,51,0.7) 0%, rgba(184,115,51,0.7) 100%);
      }
      .middle {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 32px 0 24px;
      }
      .kicker {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #b87333;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .kicker::before {
        content: '';
        display: inline-block;
        width: 28px;
        height: 1.5px;
        background: #b87333;
        opacity: 0.6;
      }
      .title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 72px;
        font-weight: 600;
        line-height: 1.08;
        color: #f5f2ed;
        letter-spacing: -0.01em;
        margin-bottom: 28px;
        max-width: 780px;
      }
      .desc {
        font-size: 20px;
        color: rgba(245,242,237,0.55);
        line-height: 1.5;
        font-weight: 400;
        max-width: 600px;
      }
      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pills {
        display: flex;
        gap: 32px;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: rgba(245,242,237,0.45);
        letter-spacing: 0.04em;
        font-weight: 500;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #b87333;
        opacity: 0.7;
      }
      .domain {
        font-size: 14px;
        color: rgba(245,242,237,0.25);
        letter-spacing: 0.06em;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <img src="/logo.png" alt="KL MedTech" style="height:52px;width:auto;" />

      </div>

      <div class="body">
        <div class="middle">
          <div class="kicker">Strategic Assessment</div>
          <h1 class="title">GCC Market Readiness Scorecard</h1>
          <p class="desc">Find out where your medical device sits in the GCC competitive landscape and how ready your organisation is to move.</p>
        </div>

        <div class="bottom">
          <div class="pills">
            <span class="pill"><span class="dot"></span>12 Questions</span>
            <span class="pill"><span class="dot"></span>4 Minutes</span>
            <span class="pill"><span class="dot"></span>Instant Results</span>
          </div>
          <span class="domain">kl-advisory.ae/scorecard</span>
        </div>
      </div>
    </div>
  </body>
</html>

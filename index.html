<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Tuned</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f5f5;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .container {
    max-width: 1100px;
    width: 100%;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 40px;
    align-items: center;
    padding: 40px;
  }
  .image img {
    width: 100%;
    border-radius: 8px;
  }
  .content {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .line {
    width: 80px;
    height: 3px;
    background: #a16207;
  }
  h1 {
    font-size: 48px;
    margin: 0;
    font-weight: 700;
  }
  p {
    color: #555;
    font-size: 18px;
    line-height: 1.6;
  }
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      text-align: center;
    }
    h1 {
      font-size: 36px;
    }
    .line {
      margin: 0 auto;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="image">
    <img src="hero.png" alt="Stay tuned visual">
  </div>
  <div class="content">
    <div class="line"></div>
    <h1>Stay tuned</h1>
    <p>Clear path. Fewer variables. Build real momentum in UAE & KSA.  
    Full experience launching soon.</p>
  </div>
</div>

</body>
</html>

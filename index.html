<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KL MedTech — GCC Commercial Architecture</title>
  <meta name="description" content="Your product is cleared. Its commercial system is not. GCC Commercial Architecture for international MedTech companies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0A1628; --navy2:#0f2040; --copper:#B87333; --copper2:#d4924a;
      --stone:#F5F2ED; --stone2:#E8E4DC; --white:#FFFFFF;
      --dark:#1C1C1C; --mid:#6B7280; --body:#374151;
      --ff-display:'Cormorant Garamond',Georgia,serif;
      --ff-body:'Karla',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--ff-body);font-size:22px;line-height:1.65;color:var(--dark);background:var(--white);-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .container{max-width:1080px;margin:0 auto;padding:0 2rem;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(245,242,237,0.98);backdrop-filter:blur(10px);border-bottom:1px solid rgba(184,115,51,0.2);padding:0 2rem;height:70px;display:flex;align-items:center;}
    .nav-inner{max-width:1080px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;}
    .nav-brand{display:flex;align-items:center;gap:0.65rem;}
    .nav-logo{height:58px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .nav-logo img{height:58px;width:auto;object-fit:contain;display:block;}
    .nav-name{font-size:0.95rem;font-weight:600;color:var(--navy);letter-spacing:0.01em;}
    .nav-links{display:flex;align-items:center;gap:2rem;}
    .nav-links a{font-size:0.95rem;font-weight:400;color:rgba(10,22,40,0.6);letter-spacing:0.03em;transition:color 0.2s;}
    .nav-links a:hover{color:var(--copper);}
    .nav-cta{background:transparent;border:1px solid var(--copper);color:var(--copper);font-family:var(--ff-body);font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:0.45rem 1.1rem;cursor:pointer;transition:all 0.2s;display:inline-block;}
    .nav-cta:hover{background:var(--copper);color:var(--white);}

    /* HERO */
    #hero{min-height:100vh;background:var(--navy);display:flex;align-items:center;padding:8rem 2rem 6rem;position:relative;overflow:hidden;}
    #hero::before{content:'';position:absolute;inset:0;background:url('assets/hero.png') center 15%/65% no-repeat;opacity:0.3;-webkit-mask-image:radial-gradient(ellipse 70% 90% at 50% 30%, black 40%, transparent 75%);mask-image:radial-gradient(ellipse 70% 90% at 50% 30%, black 40%, transparent 75%);pointer-events:none;z-index:0;}
    #hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,22,40,0.35) 0%,rgba(10,22,40,0.72) 55%,rgba(10,22,40,0.97) 100%);pointer-events:none;z-index:1;}
    
    .hero-inner{max-width:1080px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:2;}
    .hero-kicker{font-size:0.92rem;font-weight:500;letter-spacing:0.16em;color:var(--copper);margin-bottom:2rem;display:block;}
    .hero-headline{font-family:var(--ff-display);font-size:clamp(3rem,5.5vw,5rem);line-height:1.08;margin-bottom:2rem;max-width:800px;}
    .hero-headline .s1{display:block;font-weight:600;color:var(--white);}
    .hero-rule{display:block;width:44px;height:2px;background:var(--copper);margin:1rem auto;}
    .hero-headline .s2{display:block;font-weight:300;color:rgba(245,242,237,0.78);font-size:clamp(2.4rem,4.5vw,4rem);}
    .hero-headline em{font-style:italic;color:var(--copper);font-weight:400;}
    .hero-sub{font-size:1.35rem;font-weight:300;color:rgba(245,242,237,0.72);line-height:1.8;max-width:600px;margin-bottom:2.5rem;text-align:center;}
    .hero-actions{display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;}
    .btn-primary{background:var(--copper);color:var(--white);border:none;font-family:var(--ff-body);font-size:0.85rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:0.95rem 2.2rem;cursor:pointer;transition:background 0.2s;display:inline-block;}
    .btn-primary:hover{background:var(--copper2);}
    .hero-note{font-size:1rem;color:rgba(245,242,237,0.38);}

    /* STATS STRIP */
    #stats{background:var(--stone);border-bottom:1px solid var(--stone2);}
    .stats-inner{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);padding:0 2rem;}
    .stat-item{padding:2rem 1.5rem;border-right:1px solid var(--stone2);transition:background 0.2s;}
    .stat-item:last-child{border-right:none;}
    .stat-item:hover{background:rgba(184,115,51,0.04);}
    .stat-num{font-family:var(--ff-display);font-size:2.4rem;font-weight:600;color:var(--navy);line-height:1;margin-bottom:0.3rem;}
    .stat-num span{color:var(--copper);}
    .stat-label{font-size:1.1rem;font-weight:300;color:var(--mid);line-height:1.4;}

    /* SHARED */
    .section-kicker{font-size:0.92rem;font-weight:500;letter-spacing:0.14em;color:var(--copper);margin-bottom:0.75rem;display:block;}
    .copper-rule{display:block;width:40px;height:2px;background:var(--copper);margin-bottom:1.5rem;}
    .section-heading{font-family:var(--ff-display);font-size:clamp(2.1rem,3.5vw,3.2rem);font-weight:500;line-height:1.2;color:var(--navy);margin-bottom:1.5rem;}
    .section-heading-light{font-family:var(--ff-display);font-size:clamp(2.1rem,3.5vw,3.2rem);font-weight:500;line-height:1.2;color:var(--white);margin-bottom:1rem;}

    /* PROBLEM */
    #problem{background:var(--white);padding:6rem 2rem;}
    .problem-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:5rem;align-items:start;}
    .problem-left{position:sticky;top:80px;}
    .problem-body{font-size:1.35rem;font-weight:300;line-height:1.9;color:var(--body);}
    .problem-body p+p{margin-top:1.25rem;}
    .problem-body strong{font-weight:600;color:var(--dark);}
    .problem-pull{margin-top:2rem;padding:1.5rem 1.75rem;border-left:3px solid var(--copper);background:rgba(184,115,51,0.05);}
    .problem-pull p{font-family:var(--ff-display);font-size:1.5rem;font-style:italic;font-weight:500;color:var(--navy);line-height:1.5;}

    /* CONTRAST TABLE */
    #contrast{background:var(--stone);padding:6rem 2rem;}
    .contrast-header{text-align:center;margin-bottom:3rem;}
    .contrast-header p{font-size:1.2rem;font-weight:300;color:var(--body);max-width:52ch;margin:0 auto;}
    .contrast-wrap{border:1px solid var(--stone2);overflow:hidden;}
    .contrast-head-row{display:grid;grid-template-columns:1fr 1fr;}
    .contrast-col-head{padding:1.1rem 1.75rem;display:flex;align-items:center;gap:0.65rem;}
    .contrast-col-head.without{background:rgba(10,22,40,0.05);}
    .contrast-col-head.with{background:var(--navy);}
    .contrast-col-title{font-size:0.92rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
    .contrast-col-title.without{color:var(--mid);}
    .contrast-col-title.with{color:var(--copper);}
    .c-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .c-dot.without{background:var(--mid);}
    .c-dot.with{background:var(--copper);}
    .contrast-row{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--stone2);}
    .c-cell{padding:1.25rem 1.75rem;font-size:1.22rem;font-weight:300;line-height:1.55;display:flex;align-items:flex-start;gap:0.65rem;}
    .c-cell+.c-cell{border-left:1px solid var(--stone2);}
    .c-cell.without{color:var(--mid);}
    .c-cell.with{color:var(--dark);font-weight:400;}
    .c-mark{flex-shrink:0;font-size:0.85rem;margin-top:0.05rem;}
    .c-mark.x{color:#C0392B;}
    .c-mark.ok{color:var(--copper);}

    /* ARCHITECTURE */
    #architecture{background:var(--navy);padding:6rem 2rem;}
    .arch-header{text-align:center;margin-bottom:1rem;}
    .arch-sub{text-align:center;font-size:1.15rem;font-weight:300;color:rgba(245,242,237,0.55);margin-bottom:3rem;letter-spacing:0.04em;}
    .arch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(184,115,51,0.1);border:1px solid rgba(184,115,51,0.1);}
    .arch-item{background:rgba(10,22,40,0.97);padding:2rem 1.75rem;transition:background 0.2s;}
    .arch-item:hover{background:rgba(15,32,64,1);}
    .arch-num{font-family:var(--ff-display);font-size:2rem;font-weight:400;color:rgba(184,115,51,0.65);line-height:1;margin-bottom:0.75rem;}
    .arch-title{font-family:var(--ff-display);font-size:1.4rem;font-weight:500;color:var(--white);margin-bottom:0.6rem;line-height:1.3;}
    .arch-body{font-size:1.2rem;font-weight:300;color:rgba(245,242,237,0.65);line-height:1.75;}

    /* MID CTA */
    #mid-cta{background:var(--copper);padding:3rem 2rem;text-align:center;}
    .mid-cta-inner{max-width:600px;margin:0 auto;}
    .mid-cta-text{font-family:var(--ff-display);font-size:1.9rem;font-style:italic;font-weight:500;color:var(--white);margin-bottom:1.25rem;line-height:1.4;}
    .btn-white{background:var(--white);color:var(--copper);border:none;font-family:var(--ff-body);font-size:0.85rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:0.9rem 2rem;cursor:pointer;transition:all 0.2s;display:inline-block;}
    .btn-white:hover{background:var(--navy);color:var(--white);}

    /* WHO */
    #who{background:var(--white);padding:6rem 2rem;}
    .who-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
    .who-intro{font-size:1.35rem;font-weight:300;line-height:1.8;color:var(--body);margin-bottom:2rem;}
    .fit-table{display:flex;flex-direction:column;}
    .fit-col-head{padding:0.9rem 1.25rem;font-size:0.88rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:0.6rem;}
    .fit-col-head.not{background:rgba(10,22,40,0.04);color:var(--mid);border:1px solid var(--stone2);}
    .fit-col-head.is{background:var(--navy);color:var(--copper);border:1px solid var(--navy);margin-top:1.5rem;}
    .fit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .fit-dot.not{background:var(--mid);}
    .fit-dot.is{background:var(--copper);}
    .fit-item{padding:1.1rem 1.25rem;font-size:1.2rem;font-weight:300;line-height:1.55;border:1px solid var(--stone2);border-top:none;display:flex;align-items:flex-start;gap:0.75rem;}
    .fit-item.is-item{border-color:rgba(10,22,40,0.1);}
    .fit-mark{flex-shrink:0;margin-top:0.1rem;font-size:0.85rem;}
    .fit-mark.not{color:#C0392B;}
    .fit-mark.is{color:var(--copper);}
    .fit-text{color:var(--body);}

    /* ABOUT */
    #about{background:var(--stone);padding:6rem 2rem;}
    .about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:start;}
    .about-card{background:var(--navy);}
    .about-photo-wrap{overflow:hidden;height:420px;}
    .about-photo{width:100%;height:100%;object-fit:cover;object-position:center 12%;display:block;filter:grayscale(10%);}
    .about-card-body{padding:2rem 2rem 2.5rem;}
    .about-name{font-family:var(--ff-display);font-size:1.9rem;font-weight:500;color:var(--white);margin-bottom:0.2rem;}
    .about-title{font-size:0.82rem;font-weight:400;letter-spacing:0.06em;color:var(--copper);text-transform:uppercase;margin-bottom:1.5rem;}
    .about-divider{height:1px;background:rgba(184,115,51,0.2);margin-bottom:1.5rem;}
    .about-meta{display:flex;flex-direction:column;gap:0.7rem;}
    .about-meta-row{display:flex;align-items:flex-start;gap:1rem;}
    .about-meta-key{font-weight:500;color:rgba(245,242,237,0.5);letter-spacing:0.04em;min-width:100px;flex-shrink:0;font-size:0.8rem;text-transform:uppercase;padding-top:0.1rem;}
    .about-meta-val{color:rgba(245,242,237,0.9);font-weight:300;font-size:1.1rem;line-height:1.4;}
    .about-body-text{font-size:1.35rem;font-weight:300;line-height:1.9;color:var(--body);}
    .about-body-text p+p{margin-top:1rem;}
    .about-numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:2rem;border-top:1px solid var(--stone2);padding-top:1.5rem;}
    .about-num-item{padding-right:1.5rem;}
    .about-num-item+.about-num-item{padding-left:1.5rem;border-left:1px solid var(--stone2);}
    .about-num-val{font-family:var(--ff-display);font-size:2rem;font-weight:600;color:var(--navy);line-height:1;margin-bottom:0.2rem;}
    .about-num-val span{color:var(--copper);}
    .about-num-label{font-size:1rem;font-weight:300;color:var(--mid);}
